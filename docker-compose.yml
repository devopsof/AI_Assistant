services:
  chromadb:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      STORAGE_MODE: local
      DOCUMENT_STORAGE_PATH: /app/data/documents
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      - chromadb
    ports:
      - "9000:9000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  chroma_data:
